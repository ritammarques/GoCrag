# ═══════════════════════════════════════════════════════
# GoCrag — Netlify Build Configuration
# ═══════════════════════════════════════════════════════

[build]
  command   = "npm run build"
  publish   = ".next"

# O plugin oficial do Netlify para Next.js 14 (App Router + SSR)
# Instala automaticamente — não precisa de ser declarado em package.json
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Variáveis de ambiente necessárias (definir no Netlify Dashboard)
# [build.environment]
#   NEXT_PUBLIC_SUPABASE_URL        = "..."
#   NEXT_PUBLIC_SUPABASE_ANON_KEY   = "..."
#   NEXT_PUBLIC_OPENWEATHER_API_KEY = "..."
#   NEXT_PUBLIC_APP_URL             = "https://gocrag.netlify.app"

# Versão de Node.js
[build.environment]
  NODE_VERSION = "20"
